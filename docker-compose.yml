services:
  postgres:
    image: postgres:16
    container_name: in-the-loop-postgres
    environment:
      POSTGRES_DB: in_the_loop
      POSTGRES_USER: in_the_loop
      POSTGRES_PASSWORD: in_the_loop
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U in_the_loop -d in_the_loop']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: in-the-loop-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://in_the_loop:in_the_loop@postgres:5432/in_the_loop
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - '3000:3000'

volumes:
  postgres_data:
